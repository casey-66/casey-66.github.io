<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Casey's Website</title>

<body>
	<div class="wrapper">
		<div id="bg-left">
			<canvas class="erasable pickable image vtile" data-src="/images/tile-left.png"></canvas>
		</div>
		<div id="bg-right">
			<canvas class="erasable pickable image vtile" data-src="/images/tile-right.png"></canvas>
		</div>
		<div id="foreground-canvases"></div>
		<div class="main">
			<h1>My Webpage!</h1>
			<div class="bio">
				<p>
					This is me! --&gt;
					<br>
					My name is Casey (19)
					<br>
					⚧
				</p>
				<div class="stack">
					<canvas class="erasable pickable image" width="150" height="200" data-src="/images/home/casey.png"></canvas>
					<canvas class="pickable image" width="150" height="200" data-src="/images/home/casey-alt.png"></canvas>
				</div>
			</div>
			<p>
				I originally made this site as an <a href="/apology.html">apology</a> to my friend Jackie for being <span class="anchor"><canvas class="erasable pickable image" width="73" height="21" data-src="/images/home/annoying.png"></canvas>annoying</span> like usual.
				I decided to keep it as a creative outlet ^_^
			</p>
			
			<div class="toolbar">
				<div class="tools">
					<button class="tool" id="eyedropper-button"><img src="/draw/images/toolbar/eyedropper.png"></button>
					<button class="tool" id="eraser-button"><img src="/draw/images/toolbar/eraser.png"></button>
					<button class="tool" id="pencil-button"><img src="/draw/images/toolbar/pencil.png"></button>
					<button class="tool" id="brush-button"><img src="/draw/images/toolbar/brush.png"></button>
				</div>
				<div class="options">
					<div class="brushes">
						<button class="brush" id="brush-large-circle"><img src="/draw/images/toolbar/brush-large-circle.png"></button>
						<button class="brush" id="brush-small-circle"><img src="/draw/images/toolbar/brush-small-circle.png"></button>
						<button class="brush" id="brush-oblique"><img src="/draw/images/toolbar/brush-oblique.png"></button>
						<button class="brush" id="brush-large-square"><img src="/draw/images/toolbar/brush-large-square.png"></button>
						<button class="brush" id="brush-small-square"><img src="/draw/images/toolbar/brush-small-square.png"></button>
						<button class="brush" id="brush-smaller-square"><img src="/draw/images/toolbar/brush-smaller-square.png"></button>
					</div>
				</div>
				<div class="palette">
					<input id="color-input" type="color" value="#FF00FF"></input>
					<div class="color-preview"></div>
				</div>
			</div>
			
			<nav class="center">
				<ul>

					<li><a href="/games">My Games<br><img src="/images/home/games_icon.gif" width="48" height="48"></img></a></li>
				</ul>
